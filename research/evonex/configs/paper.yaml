model:
  num_classes: 2
  embed_dim: 128
  lc_seq_length: 2000
  num_tic_features: 12

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.0001
  weight_decay: 0.00001
  grad_clip: 1.0
  scheduler: cosine
  seed: 42

data:
  version: "v4-paper-10000"
  min_period: 0.5
  max_period: 20.0

output:
  weights_dir: "../weights"
  experiment_dir: "../experiments"
