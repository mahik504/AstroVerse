name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest numpy scipy astropy scikit-learn pandas h5py pyyaml
          pip install fastapi uvicorn python-multipart httpx

      - name: Model smoke test
        run: python research/evonex/src/model_evonex.py

      - name: Run model tests
        run: cd research/evonex && python -m pytest tests/test_model.py -v

      - name: Run preprocessing tests
        run: cd research/evonex && python -m pytest tests/test_preprocessing.py -v

      - name: Run API tests
        run: cd services/evonex-api && python -m pytest tests/test_api.py -v
